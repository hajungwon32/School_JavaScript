<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        // 나이에 따른 버스 요금 계산
        let age = prompt("나이 입력");

        if (age <= 6) {
            console.log("무료");
        } else if (age < 12) {
            console.log("450원");
        } else if (age < 18) {
            console.log("700원");
        } else if (age >= 70) {
            console.log("무료(노인)");
        } else {
            console.log("1000원");
        }


    </script>
</body>

</html>
