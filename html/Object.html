<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        /*
        파이썬의 딕셔너리와 유사
        관련있는 데이터를 하나로 담기 위해 사용
        {} 이거 사용함
         {키(key) : 값(value)}
         키 값은 유일하다. -> 하나뿐임
         키 값은 String(문자열)이다.
         값 : 문자열, 숫자, boolean, [](배열), {}(객체)...
         순서가 반드시 유지되는 것은 아니다. (그러나 ES6이후 가급적 유지하려고 노력한다.)
        */
        let student = {
            name: "강하윤",
            age: 17,
            phone: "010-1111-2222",
            address: "서울시 관악구"
        };
        console.log(student);
        // 키에 숫자가 올 수 없다
        //js가 알아서 "" 붙여줌
        let person = {
            111: "모두 1",
            222: "모두 2"
        };
        console.log(person);
        // 키 값을 가져오는 함수 : Object.keys()
        let keys = Object.keys(person);
        console.log(keys);
        console.log(keys[0]);
        // 값을 가져오자
        let name = student.name;
        console.log(name);

        // 객체의 값 변경 : 객체명.키 = 값
        student.name = "강하늘";
        console.log(student.name);

        // 객체에 새로운 키와 값 추가 :: 객체명.키 = 값
        student.bloodType = "AB";
        console.log(student.bloodType);


        // 객체를 생성하는 다른 방법
        let person2 = {};
        person2.name = "유재석";
        person2.age = 50;

        // Object의 특정 키에 접근하는 방법!!!!!!!!!!!!!!
        // 객체이름["키"] => 유저가 하윤이의 블러드 타입을 알고 싶을 때
        console.log(student.bloodType);
        console.log(student["bloodType"]);

        let userInputKey = prompt("알고 싶은 정도는? (name, age, phone, address, bloodType)") // 오타 날 것을 대비해 ~~해야하지만 지금은 일단 스킵
        console.log(userInputKey, ":", student[userInputKey])
        // console.log(student.userInputKey)  이거 안됨
    </script>
</body>

</html>
