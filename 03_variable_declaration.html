<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        /*
        변수 선언 - 데이터 타입 선언 X    var, let, const
        1. var
        - ES6이전부터
        - 재선언, 재할당 가능
        - 전역변수에 사용 => 권장 X (덮어쓰기)
        */
        var studentName = "2학년 1반";
        console.log(studentName);
        var studentName = "2학년 3반"; // 재선언 가능
        console.log(studentName);
        studentName = "2학년 2반"; // 재할당 가능
        console.log(studentName);

        var x = 8;
        var y = 9;
        var z = x + y;
        console.log("Z: ", z);

        var x = 10; // 재선언
        y = 11; // 재할당
        z = x - y;
        console.log("Z: ", z);

        let x1 = 10;
        let y1 = 11;
        let z1 = x1 + y1;
        console.log("z1 :", z1);

        // let x1 = 9; 재선언 불가 => syntax 에러
        x1 = 26;
        z1 = x1 + y1;
        console.log("z1 :", z1);


        /*
        const
        - ES6이후 등장
        - 변하지 않는 상수값 => 대문자
        - 재선언, 재할당 불가
        - 현업 -> 
        */
        const PI = 3.14;
        // PI = 3; 재할당 불가
        console.log(PI);

        const korea_dateFormat = "YYYY-MM-DD";
        const usa_dateFormat = "DD-MM-YYYY";
    </script>
</body>

</html>
