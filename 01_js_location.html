<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>자바스크립트 삽입 위치</title>
    <script>
      window.document.write("Hello World -3");
    </script>
  </head>
  <body>
    <!-- 
    자바스크립트의 삽입
    1. <head>
    2. <body> -> 가장 마지막에 삽입
    3. 외부 파일로 삽입
    4. 인라인(inline) -> 비추천
    -->
    <p>Hello World -1</p>
    <h2>Hello World -2</h2>

    <script>
      document.write("Hello World -4");
    </script>
    <script src="./js/01_js_location.js"></script>
    <button onclick="">버튼이당</button>
  </body>
</html>
