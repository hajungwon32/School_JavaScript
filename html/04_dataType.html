        /*정밀도 오차 해결방법

        */

        console.log((0.1 * 10 + 0.2 * 10) / 10);

        /*
        4. undefiend (중요)
        - 데이터 타입이자 데이터 값
        - 정의되지 않은, 값을 할당하지 않은 객체
        개발자가 실수로 할당을 안하면 에러가 나오진 않지만 할당되지 않으면 브라우저가 알아서 할당함 이게 문제
        수시로 개발자도구에서 undefined가 발생하는지 체크
        */
        let a;
        console.log(a);
        /*
        5. null (중요)
        - 없음을 의미
        - 개발자가 실수가 아니라 일부러 설정하는 경우가 많음
        - 선언시점에는 어떤 값이나 어떤 데이터 타입이 올지 정해지지 않은 경우
        - Garbage Collection(가비지 컬렉션: 더 이상 사용하지 않는 데이터를 메모리에서 삭제)

        메모리
        주메모리(RAM): 16G, 32G, 보조메모리: 하드디스크, USB, 외장 하드
        */
        let jsonData = "굉장히 큰 데이터";
        jsonDate = null; // 연결을 끊다. Garbage Collection
